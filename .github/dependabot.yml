version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-production-security:
        applies-to: "security-updates"
        dependency-type: "production"
        patterns:
          - "*"
      npm-development-security:
        applies-to: "security-updates"
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker-base-images-security:
        applies-to: "security-updates"
        patterns:
          - "*"
