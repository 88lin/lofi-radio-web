<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#D946EF"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="vinylGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#D946EF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle with glow -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#glow)"/>
  
  <!-- Vinyl Record Base -->
  <circle cx="256" cy="256" r="195" fill="url(#vinylGradient)"/>
  
  <!-- Vinyl Grooves - subtle -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="256" cy="256" r="135" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="256" cy="256" r="115" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  
  <!-- Highlight on vinyl -->
  <ellipse cx="180" cy="180" rx="60" ry="40" fill="rgba(255,255,255,0.03)" transform="rotate(-30 180 180)"/>
  
  <!-- Center Label -->
  <circle cx="256" cy="256" r="65" fill="url(#centerGradient)"/>
  
  <!-- Music Note Icon - stylized -->
  <g transform="translate(220, 215)">
    <!-- Note stem and flag -->
    <path d="M50 10 L50 75 C50 90 35 95 25 88 C15 81 15 68 25 62 C35 56 50 62 50 75" 
          fill="white" opacity="0.95"/>
    <path d="M15 25 L15 80 C15 95 0 100 -10 93 C-20 86 -20 73 -10 67 C0 61 15 67 15 80" 
          fill="white" opacity="0.95"/>
    <!-- Connecting bar -->
    <rect x="15" y="10" width="35" height="8" rx="4" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Center small hole -->
  <circle cx="256" cy="256" r="12" fill="rgba(0,0,0,0.4)"/>
</svg>
