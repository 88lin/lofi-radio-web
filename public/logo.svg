<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F0F0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Circular Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#softGlow)"/>
  
  <!-- Decorative circles -->
  <circle cx="380" cy="132" r="40" fill="white" opacity="0.1"/>
  <circle cx="132" cy="380" r="32" fill="white" opacity="0.08"/>
  
  <!-- Music note - modern minimalist style -->
  <g>
    <!-- Main note body -->
    <ellipse cx="200" cy="340" rx="56" ry="44" fill="url(#noteGradient)"/>
    
    <!-- Second note -->
    <ellipse cx="340" cy="300" rx="56" ry="44" fill="url(#noteGradient)"/>
    
    <!-- Stems -->
    <rect x="244" y="140" width="16" height="200" rx="8" fill="url(#noteGradient)"/>
    <rect x="384" y="100" width="16" height="200" rx="8" fill="url(#noteGradient)"/>
    
    <!-- Connecting beam -->
    <path d="M244 140 L400 100 L400 140 L244 180 Z" fill="url(#noteGradient)"/>
  </g>
  
  <!-- Sound waves -->
  <g opacity="0.6">
    <path d="M420 200 Q450 256 420 312" stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M445 170 Q490 256 445 342" stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.25"/>
  </g>
</svg>
